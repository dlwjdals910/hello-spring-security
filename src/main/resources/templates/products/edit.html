<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .footer-info { color: #e94560; font-size: 0.9rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="max-width:600px">
    <div class="card border-0 shadow-sm p-4">
        <h5 class="fw-bold mb-4">상품 수정</h5>
        <form th:action="@{/products/{id}/edit(id=${productId})}"
              th:object="${productDto}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">상품명</label>
                <input type="text" class="form-control"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       th:field="*{name}" placeholder="상품명을 입력하세요"/>
                <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">가격</label>
                <input type="number" class="form-control"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                       th:field="*{price}" placeholder="가격을 입력하세요"/>
                <div class="invalid-feedback" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">재고</label>
                <input type="number" class="form-control"
                       th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'"
                       th:field="*{stock}" placeholder="재고를 입력하세요"/>
                <div class="invalid-feedback" th:errors="*{stock}"></div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">설명</label>
                <textarea class="form-control" th:field="*{description}" rows="3"
                          placeholder="상품 설명을 입력하세요"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">수정 완료</button>
                <a th:href="@{/products}" class="btn btn-outline-secondary px-4">취소</a>
            </div>
        </form>
    </div>
</div>

<footer class="text-center mt-5 pb-4">
    <p class="footer-info"
       th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (EEE) a hh:mm:ss')}"></p>
    <p class="footer-info">학번: 2171144 | 성명: 이정민</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
